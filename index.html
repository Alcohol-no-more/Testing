<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="theme-color" content="#ff6b6b">
    
    <title>終極物理鎖死版</title>
    
    <style>
        /* 1. 物理鎖死：直接把 HTML 和 Body 釘死在螢幕四個角 */
        html, body {
            position: fixed; /* 核心：禁止任何原生滾動與彈性邊界 */
            top: 0;
            left: 0;
            width: 100vw; /* 絕對物理寬度 */
            height: 100vh; /* 在 iOS 中，100vh 剛好等於包含瀏海的完整硬體高度 */
            margin: 0;
            padding: 0;
            overflow: hidden; 
            
            /* 把漸層色直接灌進這個被釘死的畫布裡 */
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            background-color: #ff6b6b; /* 買雙重保險 */
        }

        /* 2. 內容層：在釘死的畫布裡，安分地避開危險區 */
        #setup-screen {
            position: absolute; /* 相對於釘死的 body 定位 */
            inset: 0; /* 等同於 top/bottom/left/right 都是 0 */
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 讓裡面的東西不要撞到瀏海和底條 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .box {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            color: #fff;
            font-family: -apple-system, sans-serif;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="box">
            <h2 style="letter-spacing: 2px;">物理鎖死測試</h2>
            <p style="margin-top: 10px; font-size: 14px; opacity: 0.8;">
                絕對不會再有白邊或黑邊
            </p>
        </div>
    </div>

</body>
</html>
