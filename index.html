<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全螢幕測試</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            /* 背景放在 body，自動填滿包括 Safe Area */
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }
        /* 封面層透明，顯示 body 背景 */
        #setup-screen {
            position: fixed; inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 沒有背景色，透明 */
        }
        .box {
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div id="setup-screen">
        <div class="box">
            <p>全螢幕測試</p>
            <p id="info"></p>
            <p style="margin-top:16px;font-size:12px;opacity:0.7;">
                上下有沒有白邊？
            </p>
        </div>
    </div>
    <script>
        document.getElementById('info').innerText = 
            `螢幕高度: ${window.innerHeight}px`;
    </script>
</body>
</html>
