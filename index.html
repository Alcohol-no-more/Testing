<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>全螢幕測試</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="./manifest.json">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 修正 4: 使用 min-height: 100dvh (動態視窗高度) */
        body, html {
            width: 100%;
            height: 100dvh; 
            margin: 0;
            overflow: hidden;
            /* 修正 5: 確保底色是黑色，與狀態列融合 */
            background-color: #000; 
        }

        /* 修正 6: 獨立的背景層，強制定位在螢幕絕對邊緣 */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
        }

        /* 修正 7: 內容層，使用 Safe Area Padding 避開文字被瀏海擋住 */
        #setup-screen {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: sans-serif;
            
            /* 這兩行確保文字內容不會被瀏海或底部橫條遮擋，但背景依然全螢幕 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .box {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div id="bg-layer"></div>

    <div id="setup-screen">
        <div class="box">
            <p style="font-weight: bold; font-size: 20px;">全螢幕測試成功</p>
            <p id="info" style="margin-top: 10px;"></p>
            <p style="margin-top:20px; font-size:12px; opacity:0.8;">
                背景應該已經填滿「瀏海」與「底條」了。<br>
                文字內容則自動避開了安全區。
            </p>
        </div>
    </div>

    <script>
        document.getElementById('info').innerText = 
            `當前視窗高度: ${window.innerHeight}px`;
    </script>
</body>
</html>
