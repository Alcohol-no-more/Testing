<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Word Passport 級全螢幕</title>
    
    <style>
        /* 核心修復區：徹底解決 iOS 高度 Bug */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            
            /* 1. 基本高度 */
            height: 100%; 
            /* 2. 備用高度 */
            min-height: 100vh;
            /* 3. 蘋果專屬：強制填滿包含安全區的所有可用空間 */
            min-height: -webkit-fill-available; 
            
            overflow: hidden; /* 防止畫面上滑出現白底 */
            
            /* 秘訣：把最底層的顏色直接寫在 body 上！這樣就算露餡也是漸層色 */
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, sans-serif;
        }

        /* 這是未來你要放 Unsplash 照片的圖層 */
        #bg-image {
            position: absolute; /* 改用 absolute，讓它完全貼合 body 的尺寸 */
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
            /* 這裡先設定透明度為 0，這樣你才能看到 body 的漸層色 */
            opacity: 0; 
        }

        /* 內容層：負責避開瀏海 */
        #setup-screen {
            position: relative;
            z-index: 10;
            width: 100%;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            justify-content: center;
        }

        .box {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            color: #fff;
        }
    </style>
</head>
<body>
    
    <div id="bg-image"></div>

    <div id="setup-screen">
        <div class="box">
            <h2 style="letter-spacing: 2px;">完美全螢幕</h2>
            <p style="margin-top: 10px; font-size: 14px; opacity: 0.8;">
                Word Passport 的底層邏輯
            </p>
        </div>
    </div>

</body>
</html>
