<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fullscreen Test v2</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FS Test">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="./manifest.json">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --sal: env(safe-area-inset-left, 0px);
            --sar: env(safe-area-inset-right, 0px);
        }

        html {
            background: #000;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
            overscroll-behavior: none;
        }

        /* ★ 修正：背景用 100vh 而非 inset:0 */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 再加一層保險：往下多延伸 */
            min-height: calc(100vh + env(safe-area-inset-top, 0px) + env(safe-area-inset-bottom, 0px));
            background: url('https://picsum.photos/seed/test456/1200/800') center/cover no-repeat;
            background-color: #333;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            min-height: calc(100vh + env(safe-area-inset-top, 0px) + env(safe-area-inset-bottom, 0px));
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }

        /* 安全區邊界視覺化 */
        .safe-area-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--sat);
            background: rgba(255,0,0,0.3);
            border-bottom: 2px dashed red;
            z-index: 10;
        }
        .safe-area-bottom {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--sab);
            background: rgba(0,100,255,0.3);
            border-top: 2px dashed blue;
            z-index: 10;
        }

        .corner {
            position: fixed;
            width: 30px; height: 30px;
            z-index: 10;
        }
        .corner-tl { top: 0; left: 0; border-top: 3px solid lime; border-left: 3px solid lime; }
        .corner-tr { top: 0; right: 0; border-top: 3px solid lime; border-right: 3px solid lime; }
        .corner-bl { bottom: 0; left: 0; border-bottom: 3px solid lime; border-left: 3px solid lime; }
        .corner-br { bottom: 0; right: 0; border-bottom: 3px solid lime; border-right: 3px solid lime; }

        .content {
            position: relative;
            z-index: 5;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            padding-left: var(--sal);
            padding-right: var(--sar);
        }

        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 30px;
            width: 300px;
            text-align: center;
        }

        h1 { font-size: 20px; letter-spacing: 3px; margin-bottom: 20px; }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            letter-spacing: 1px;
        }
        .info-row:last-child { border-bottom: none; }
        .label { opacity: 0.6; }
        .value { font-weight: bold; }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .status.pass { background: rgba(0,200,100,0.3); border: 1px solid rgba(0,200,100,0.5); }
        .status.fail { background: rgba(255,50,50,0.3); border: 1px solid rgba(255,50,50,0.5); }

        .legend {
            margin-top: 20px;
            font-size: 9px;
            opacity: 0.5;
            letter-spacing: 1px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="safe-area-top"></div>
    <div class="safe-area-bottom"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="content">
        <div class="card">
            <h1>📐 FULLSCREEN TEST v2</h1>

            <div class="info-row">
                <span class="label">MODE</span>
                <span class="value" id="v-mode">—</span>
            </div>
            <div class="info-row">
                <span class="label">SAFE TOP</span>
                <span class="value" id="v-top">—</span>
            </div>
            <div class="info-row">
                <span class="label">SAFE BOTTOM</span>
                <span class="value" id="v-bottom">—</span>
            </div>
            <div class="info-row">
                <span class="label">WINDOW</span>
                <span class="value" id="v-window">—</span>
            </div>
            <div class="info-row">
                <span class="label">SCREEN</span>
                <span class="value" id="v-screen">—</span>
            </div>
            <div class="info-row">
                <span class="label">BG SIZE</span>
                <span class="value" id="v-bgsize">—</span>
            </div>
            <div class="info-row">
                <span class="label">NO WHITE GAP</span>
                <span class="value" id="v-gap">—</span>
            </div>

            <div class="status" id="v-status">CHECKING...</div>

            <div class="legend">
                🟢 GREEN CORNERS = EDGE REACHED<br>
                🔴 RED ZONE = TOP SAFE AREA<br>
                🔵 BLUE ZONE = BOTTOM SAFE AREA<br>
                NO WHITE SHOULD BE VISIBLE
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(rs => {
                rs.forEach(r => r.unregister());
            });
            if (window.caches) {
                caches.keys().then(names => {
                    names.forEach(n => caches.delete(n));
                });
            }
        }

        function measure() {
            const root = document.documentElement;
            const cs = getComputedStyle(root);
            const sat = cs.getPropertyValue('--sat').trim() || '0px';
            const sab = cs.getPropertyValue('--sab').trim() || '0px';
            const topVal = parseFloat(sat) || 0;
            const bottomVal = parseFloat(sab) || 0;
            const isPWA = window.navigator.standalone === true;

            const bg = document.querySelector('.bg');
            const bgRect = bg.getBoundingClientRect();

            document.getElementById('v-mode').textContent = isPWA ? 'PWA (STANDALONE)' : 'SAFARI BROWSER';
            document.getElementById('v-top').textContent = sat;
            document.getElementById('v-bottom').textContent = sab;
            document.getElementById('v-window').textContent = `${window.innerWidth} × ${window.innerHeight}`;
            document.getElementById('v-screen').textContent = `${screen.width} × ${screen.height}`;
            document.getElementById('v-bgsize').textContent = `${Math.round(bgRect.width)} × ${Math.round(bgRect.height)}`;

            const bgCoversScreen = bgRect.height >= screen.height;
            const gapEl = document.getElementById('v-gap');
            const status = document.getElementById('v-status');

            if (isPWA && topVal > 0 && bgCoversScreen) {
                gapEl.textContent = '✅ YES';
                status.textContent = '✅ FULLY COVERED';
                status.className = 'status pass';
            } else if (isPWA && topVal > 0) {
                gapEl.textContent = '⚠️ BG TOO SHORT';
                status.textContent = `⚠️ GAP: ${screen.height - Math.round(bgRect.height)}px`;
                status.className = 'status fail';
            } else if (isPWA) {
                gapEl.textContent = '❌ NO SAFE AREA';
                status.textContent = '❌ NOT WORKING';
                status.className = 'status fail';
            } else {
                gapEl.textContent = '—';
                status.textContent = '❌ NOT FULLSCREEN (Safari)';
                status.className = 'status fail';
            }
        }

        measure();
        setInterval(measure, 1000);

        document.addEventListener('touchmove', e => {
            if (e.target.closest('.card')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
